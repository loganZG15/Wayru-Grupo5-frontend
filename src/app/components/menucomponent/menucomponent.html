@if (!isLoginPage()) {
  <div class="container">
    <mat-toolbar class="custom-toolbar">
      <button matButton class="btn-rojo" routerLink="/homes">
        <mat-icon>home</mat-icon>Home
      </button>

      @if (verificar()) {
        <button
          matButton
          class="btn-rojo"
          aria-label="Menú de incidencias"
          [matMenuTriggerFor]="menuIncidencia"
        >
          <mat-icon>report</mat-icon>Incidencias
        </button>

        <button matButton class="btn-rojo" [matMenuTriggerFor]="menuCategoria">
          <mat-icon>category</mat-icon>Categorías
        </button>

        <button matButton class="btn-rojo" [matMenuTriggerFor]="menuDistrito">
          <mat-icon>location_city</mat-icon>Distritos
        </button>

        <button matButton class="btn-rojo" [matMenuTriggerFor]="menuReportes">
          <mat-icon>bar_chart</mat-icon>Reportes
        </button>
      }

      <span class="spacer"></span>

      @if (verificar()) {
        <button mat-button [matMenuTriggerFor]="menuSalir">
          <mat-icon>account_circle</mat-icon>{{ nombreUsuario || 'Usuario' }}
        </button>
      } @else {
        <button matButton class="btn-rojo" routerLink="/login">
          <mat-icon>login</mat-icon>Iniciar sesión
        </button>
      }
    </mat-toolbar>

    <mat-menu #menuIncidencia="matMenu">
      @if (isCliente() || isAdmin()) {
        <button mat-menu-item routerLink="/incidencias/nuevo">
          <mat-icon>add</mat-icon>Registrar
        </button>
      }
      @if (isCliente()) {
        <button mat-menu-item routerLink="/incidencias/mis-incidencias">
          <mat-icon>assignment_ind</mat-icon>Mis incidencias
        </button>
      }
      <button mat-menu-item routerLink="/incidencias/lista">
        <mat-icon>list</mat-icon>Listar
      </button>
      <button mat-menu-item routerLink="/incidencias/searchs">
        <mat-icon>search</mat-icon>Buscar
      </button>
    </mat-menu>

    <mat-menu #menuCategoria="matMenu">
      @if (isSoporte() || isAdmin()) {
        <button mat-menu-item routerLink="/categorias/nuevo">
          <mat-icon>add</mat-icon>Registrar
        </button>
      }
      <button mat-menu-item routerLink="/categorias/lista">
        <mat-icon>list</mat-icon>Listar
      </button>
      <button mat-menu-item routerLink="/categorias/searchs">
        <mat-icon>search</mat-icon>Buscar
      </button>
    </mat-menu>

    <mat-menu #menuDistrito="matMenu">
      @if (isSoporte() || isAdmin()) {
        <button mat-menu-item routerLink="/distritos/nuevo">
          <mat-icon>add</mat-icon>Registrar
        </button>
      }
      <button mat-menu-item routerLink="/distritos/lista">
        <mat-icon>list</mat-icon>Listar
      </button>
      <button mat-menu-item routerLink="/distritos/searchs">
        <mat-icon>search</mat-icon>Buscar
      </button>
    </mat-menu>

    <mat-menu #menuReportes="matMenu">
      <button mat-menu-item routerLink="/reporte-incidencias">
        <mat-icon>category</mat-icon>Por categoría
      </button>
      <button mat-menu-item routerLink="/reporte-distritos">
        <mat-icon>location_city</mat-icon>Por distrito
      </button>
    </mat-menu>

    <mat-menu #menuSalir="matMenu" xPosition="before">
      <div class="profile-card" (click)="$event.stopPropagation()">
        <div class="profile-avatar">
          <mat-icon>account_circle</mat-icon>
        </div>
        <div class="profile-name">{{ nombreUsuario || 'Usuario' }}</div>
        <div class="profile-email">{{ email }}</div>
        <div class="profile-role">Rol: {{ role }}</div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/login" (click)="cerrar()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    </mat-menu>
  </div>
}
